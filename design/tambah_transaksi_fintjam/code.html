<!DOCTYPE html>

<html lang="id">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Tambah Transaksi - Fintjam</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&amp;family=Inter:wght@400;500;600&amp;family=Public+Sans:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "surface-container": "#efedee",
            "on-secondary-fixed-variant": "#42474b",
            "on-error-container": "#93000a",
            "primary-container": "#3366cc",
            "on-primary-fixed": "#001946",
            "surface-bright": "#faf9fa",
            "secondary-fixed-dim": "#c2c7cc",
            "on-surface-variant": "#434653",
            "primary-fixed": "#d9e2ff",
            "on-tertiary-fixed": "#211b00",
            "surface-dim": "#dbdadb",
            "on-tertiary": "#ffffff",
            "error": "#ba1a1a",
            "tertiary-fixed-dim": "#dcc661",
            "secondary-container": "#dfe3e8",
            "primary-fixed-dim": "#b1c5ff",
            "secondary": "#5a5f63",
            "surface-variant": "#e3e2e3",
            "error-container": "#ffdad6",
            "inverse-surface": "#303031",
            "on-secondary-container": "#606569",
            "tertiary-container": "#bfab49",
            "surface-container-low": "#f5f3f4",
            "inverse-primary": "#b1c5ff",
            "on-secondary": "#ffffff",
            "on-primary": "#ffffff",
            "on-secondary-fixed": "#171c20",
            "surface-container-high": "#e9e8e9",
            "on-primary-container": "#e7ebff",
            "inverse-on-surface": "#f2f0f1",
            "on-background": "#1b1c1d",
            "surface-container-lowest": "#ffffff",
            "primary": "#094cb2",
            "surface": "#faf9fa",
            "outline-variant": "#c3c6d5",
            "outline": "#737784",
            "on-tertiary-fixed-variant": "#524600",
            "on-error": "#ffffff",
            "background": "#faf9fa",
            "surface-container-highest": "#e3e2e3",
            "on-primary-fixed-variant": "#00419d",
            "tertiary": "#6d5e00",
            "secondary-fixed": "#dfe3e8",
            "tertiary-fixed": "#f9e37a",
            "on-surface": "#1b1c1d",
            "surface-tint": "#2259bf",
            "on-tertiary-container": "#4a3f00"
          },
          "borderRadius": {
            "DEFAULT": "0.125rem",
            "lg": "0.25rem",
            "xl": "0.5rem",
            "full": "0.75rem"
          },
          "fontFamily": {
            "headline": ["Noto Serif"],
            "display": ["Noto Serif"],
            "body": ["Inter"],
            "label": ["Public Sans"]
          }
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body class="bg-background text-on-background font-body min-h-screen flex flex-col md:flex-row">
  <!-- Sidebar for Desktop -->
  <aside
    class="hidden md:flex flex-col h-full w-72 bg-surface-container-low dark:bg-surface-container rounded-r-xl sticky top-0 py-6">
    <div class="px-6 mb-8">
      <h1 class="font-headline text-lg font-bold text-primary">Categories</h1>
    </div>
    <nav class="flex-grow space-y-1">
      <div
        class="bg-secondary-container dark:bg-on-secondary-fixed-variant text-on-secondary-container dark:text-secondary-fixed rounded-full mx-2 my-1 px-4 py-3 flex items-center gap-3 transition-colors active:opacity-80">
        <span class="material-symbols-outlined">restaurant</span>
        <span class="font-body text-sm font-medium">Food &amp; Drink</span>
      </div>
      <div
        class="text-on-surface-variant dark:text-on-surface-variant mx-2 my-1 px-4 py-3 flex items-center gap-3 hover:bg-surface-variant dark:hover:bg-on-secondary-fixed-variant transition-colors active:opacity-80">
        <span class="material-symbols-outlined">directions_car</span>
        <span class="font-body text-sm font-medium">Transportation</span>
      </div>
      <div
        class="text-on-surface-variant dark:text-on-surface-variant mx-2 my-1 px-4 py-3 flex items-center gap-3 hover:bg-surface-variant dark:hover:bg-on-secondary-fixed-variant transition-colors active:opacity-80">
        <span class="material-symbols-outlined">shopping_bag</span>
        <span class="font-body text-sm font-medium">Shopping</span>
      </div>
      <div
        class="text-on-surface-variant dark:text-on-surface-variant mx-2 my-1 px-4 py-3 flex items-center gap-3 hover:bg-surface-variant dark:hover:bg-on-secondary-fixed-variant transition-colors active:opacity-80">
        <span class="material-symbols-outlined">payments</span>
        <span class="font-body text-sm font-medium">Salary</span>
      </div>
      <div
        class="text-on-surface-variant dark:text-on-surface-variant mx-2 my-1 px-4 py-3 flex items-center gap-3 hover:bg-surface-variant dark:hover:bg-on-secondary-fixed-variant transition-colors active:opacity-80">
        <span class="material-symbols-outlined">trending_up</span>
        <span class="font-body text-sm font-medium">Investment</span>
      </div>
      <div
        class="text-on-surface-variant dark:text-on-surface-variant mx-2 my-1 px-4 py-3 flex items-center gap-3 hover:bg-surface-variant dark:hover:bg-on-secondary-fixed-variant transition-colors active:opacity-80">
        <span class="material-symbols-outlined">handshake</span>
        <span class="font-body text-sm font-medium">Debt</span>
      </div>
    </nav>
  </aside>
  <main class="flex-grow flex flex-col min-h-screen">
    <!-- TopAppBar -->
    <header class="bg-surface-container-lowest dark:bg-surface-dim docked w-full top-0 sticky z-40">
      <div class="flex justify-between items-center px-6 py-4 w-full">
        <div class="flex items-center gap-4">
          <span
            class="material-symbols-outlined text-primary dark:text-inverse-primary active:scale-95 transition-transform cursor-pointer">account_balance_wallet</span>
          <h2 class="font-headline text-2xl font-bold text-primary dark:text-inverse-primary">Fintjam</h2>
        </div>
        <div class="flex items-center gap-4">
          <span
            class="material-symbols-outlined text-on-surface-variant dark:text-on-surface-variant hover:text-primary-container dark:hover:text-primary-fixed-dim transition-colors active:scale-95 cursor-pointer">settings</span>
        </div>
      </div>
    </header>
    <!-- Content Canvas -->
    <div class="flex-grow p-6 md:p-12 lg:p-16 max-w-4xl mx-auto w-full">
      <section class="mb-12">
        <h3 class="font-headline text-headline-sm font-bold tracking-tight text-on-background mb-2">Tambah Transaksi
        </h3>
        <p class="font-body text-on-surface-variant">Catat pengeluaran atau pemasukan terbaru Anda di sini.</p>
      </section>
      <form class="space-y-8">
        <!-- Transaction Type Toggle -->
        <div class="bg-surface-container rounded-full p-1.5 flex gap-1 items-center max-w-sm mx-auto">
          <button
            class="flex-1 bg-surface-container-lowest text-primary py-3 px-6 rounded-full font-label text-sm font-bold tracking-wider transition-all shadow-sm"
            type="button">
            PENGELUARAN
          </button>
          <button
            class="flex-1 text-on-surface-variant hover:bg-surface-container-high py-3 px-6 rounded-full font-label text-sm font-bold tracking-wider transition-all"
            type="button">
            PEMASUKAN
          </button>
        </div>
        <!-- Input Bento Grid Layout -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <!-- Amount Input -->
          <div
            class="md:col-span-2 bg-surface-container-lowest p-8 rounded-xl flex flex-col items-center justify-center space-y-4">
            <label class="font-label text-xs uppercase tracking-widest text-on-surface-variant">Nominal
              Transaksi</label>
            <div class="flex items-baseline gap-2">
              <span class="font-headline text-3xl font-bold text-outline">Rp</span>
              <input
                class="w-full text-center font-headline text-6xl font-bold bg-transparent border-none focus:ring-0 text-primary placeholder:text-surface-variant p-0 m-0 appearance-none"
                placeholder="0" type="number" />
            </div>
          </div>
          <!-- Category Dropdown -->
          <div class="space-y-2">
            <label
              class="font-label text-[11px] uppercase tracking-widest text-on-surface-variant ml-1">Kategori</label>
            <div class="relative group">
              <select
                class="w-full bg-surface-container-low border-none focus:ring-2 focus:ring-primary-container rounded-xl px-4 py-4 font-body text-sm appearance-none cursor-pointer">
                <option>Makanan &amp; Minuman</option>
                <option>Transportasi</option>
                <option>Belanja</option>
                <option>Gaji / Pendapatan</option>
                <option>Investasi</option>
                <option>Temen Ngutang</option>
              </select>
              <span
                class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-outline">expand_more</span>
            </div>
          </div>
          <!-- Date Picker -->
          <div class="space-y-2">
            <label class="font-label text-[11px] uppercase tracking-widest text-on-surface-variant ml-1">Tanggal</label>
            <div class="relative">
              <input
                class="w-full bg-surface-container-low border-none focus:ring-2 focus:ring-primary-container rounded-xl px-4 py-4 font-body text-sm appearance-none cursor-pointer"
                type="date" />
            </div>
          </div>
          <!-- Description -->
          <div class="md:col-span-2 space-y-2">
            <label class="font-label text-[11px] uppercase tracking-widest text-on-surface-variant ml-1">Deskripsi /
              Catatan</label>
            <textarea
              class="w-full bg-surface-container-low border-none focus:ring-2 focus:ring-primary-container rounded-xl px-4 py-4 font-body text-sm resize-none"
              placeholder="Contoh: Makan siang nasi padang..." rows="3"></textarea>
          </div>
        </div>
        <!-- Submit Button -->
        <div class="pt-4">
          <button
            class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-label text-sm font-bold uppercase tracking-widest py-5 rounded-full shadow-lg hover:shadow-xl hover:scale-[1.01] active:scale-[0.98] transition-all flex items-center justify-center gap-3"
            type="submit">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">save</span>
            SIMPAN TRANSAKSI
          </button>
        </div>
      </form>
    </div>
    <!-- Spacer for Bottom Nav on Mobile -->
    <div class="h-20 md:hidden"></div>
  </main>
  <!-- BottomNavBar for Mobile -->
  <nav
    class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-surface-container-lowest dark:bg-surface-dim">
    <button
      class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-secondary-fixed-variant px-4 py-1 hover:bg-surface-container dark:hover:bg-surface-variant transition-all active:scale-90">
      <span class="material-symbols-outlined">dashboard</span>
      <span class="font-label text-[10px] uppercase tracking-wider mt-1">Dashboard</span>
    </button>
    <button
      class="flex flex-col items-center justify-center bg-primary-container dark:bg-on-primary-fixed-variant text-on-primary-container dark:text-primary-fixed rounded-full px-4 py-1 active:scale-90 transition-transform">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
      <span class="font-label text-[10px] uppercase tracking-wider mt-1">Transactions</span>
    </button>
    <button
      class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-secondary-fixed-variant px-4 py-1 hover:bg-surface-container dark:hover:bg-surface-variant transition-all active:scale-90">
      <span class="material-symbols-outlined">print</span>
      <span class="font-label text-[10px] uppercase tracking-wider mt-1">Report</span>
    </button>
    <button
      class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-secondary-fixed-variant px-4 py-1 hover:bg-surface-container dark:hover:bg-surface-variant transition-all active:scale-90">
      <span class="material-symbols-outlined">person</span>
      <span class="font-label text-[10px] uppercase tracking-wider mt-1">Profile</span>
    </button>
  </nav>
</body>

</html>
