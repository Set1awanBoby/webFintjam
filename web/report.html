<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Fintjam - Laporan &amp; Transaksi</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&amp;family=Inter:wght@400;500;600&amp;family=Public+Sans:wght@300;400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#efedee",
                        "on-secondary-fixed-variant": "#42474b",
                        "on-error-container": "#93000a",
                        "primary-container": "#3366cc",
                        "on-primary-fixed": "#001946",
                        "surface-bright": "#faf9fa",
                        "secondary-fixed-dim": "#c2c7cc",
                        "on-surface-variant": "#434653",
                        "primary-fixed": "#d9e2ff",
                        "on-tertiary-fixed": "#211b00",
                        "surface-dim": "#dbdadb",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#dcc661",
                        "secondary-container": "#dfe3e8",
                        "primary-fixed-dim": "#b1c5ff",
                        "secondary": "#5a5f63",
                        "surface-variant": "#e3e2e3",
                        "error-container": "#ffdad6",
                        "inverse-surface": "#303031",
                        "on-secondary-container": "#606569",
                        "tertiary-container": "#bfab49",
                        "surface-container-low": "#f5f3f4",
                        "inverse-primary": "#b1c5ff",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "on-secondary-fixed": "#171c20",
                        "surface-container-high": "#e9e8e9",
                        "on-primary-container": "#e7ebff",
                        "inverse-on-surface": "#f2f0f1",
                        "on-background": "#1b1c1d",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#094cb2",
                        "surface": "#faf9fa",
                        "outline-variant": "#c3c6d5",
                        "outline": "#737784",
                        "on-tertiary-fixed-variant": "#524600",
                        "on-error": "#ffffff",
                        "background": "#faf9fa",
                        "surface-container-highest": "#e3e2e3",
                        "on-primary-fixed-variant": "#00419d",
                        "tertiary": "#6d5e00",
                        "secondary-fixed": "#dfe3e8",
                        "tertiary-fixed": "#f9e37a",
                        "on-surface": "#1b1c1d",
                        "surface-tint": "#2259bf",
                        "on-tertiary-container": "#4a3f00"
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        @media print {
            .no-print { display: none !important; }
            body { background-color: white !important; }
            main { padding: 0 !important; }
        }
    </style>
</head>
<body class="bg-background text-on-background font-body antialiased">
    <header class="no-print docked w-full top-0 sticky z-40 bg-surface-container-lowest flex justify-between items-center px-6 py-4 w-full">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-primary" onclick="window.location.href='index.html'">arrow_back</span>
            <h1 class="font-headline text-2xl font-bold text-primary">Fintjam</h1>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="window.print()" class="bg-primary text-on-primary px-4 py-2 rounded-full font-label text-sm flex items-center gap-2 hover:bg-primary-container transition-colors active:scale-95">
                <span class="material-symbols-outlined text-sm">print</span>
                Cetak Laporan
            </button>
        </div>
    </header>
    <main class="flex min-h-screen">
        <div class="flex-1 px-4 md:px-8 py-8 max-w-5xl mx-auto w-full">
            <section class="mb-12">
                <p class="font-label text-tertiary font-semibold uppercase tracking-widest text-xs mb-2">Laporan Keseluruhan</p>
                <h2 class="font-headline text-4xl md:text-5xl font-bold text-on-background mb-4" id="report-month">Mei 2024</h2>
                <div class="h-1 w-24 bg-primary-container rounded-full"></div>
            </section>
            
            <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                <div class="p-8 bg-surface-container-lowest rounded-xl flex flex-col justify-between min-h-[160px] border border-outline-variant/10">
                    <div>
                        <span class="font-label text-[10px] uppercase tracking-wider text-on-surface-variant">Total Pemasukan</span>
                        <div class="text-3xl font-bold text-primary mt-2" id="report-income">Rp 0</div>
                    </div>
                </div>
                <div class="p-8 bg-surface-container-lowest rounded-xl flex flex-col justify-between min-h-[160px] border border-outline-variant/10">
                    <div>
                        <span class="font-label text-[10px] uppercase tracking-wider text-on-surface-variant">Total Pengeluaran</span>
                        <div class="text-3xl font-bold text-error mt-2" id="report-expense">Rp 0</div>
                    </div>
                </div>
                <div class="p-8 bg-tertiary-container text-on-tertiary-container rounded-xl flex flex-col justify-between min-h-[160px]">
                    <div>
                        <span class="font-label text-[10px] uppercase tracking-wider opacity-80">Saldo Bersih</span>
                        <div class="text-3xl font-bold mt-2" id="report-balance">Rp 0</div>
                    </div>
                </div>
            </section>
            
            <section class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm border border-outline-variant/10">
                <div class="px-8 py-6 flex justify-between items-center bg-surface-container-low">
                    <h3 class="font-headline text-xl font-bold">Rincian Transaksi</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-surface-container-low border-b border-outline-variant/10">
                                <th class="px-8 py-4 font-label text-[10px] uppercase tracking-widest text-on-surface-variant">Tanggal</th>
                                <th class="px-8 py-4 font-label text-[10px] uppercase tracking-widest text-on-surface-variant">Kategori</th>
                                <th class="px-8 py-4 font-label text-[10px] uppercase tracking-widest text-on-surface-variant">Keterangan</th>
                                <th class="px-8 py-4 font-label text-[10px] uppercase tracking-widest text-on-surface-variant text-right">Jumlah</th>
                            </tr>
                        </thead>
                        <tbody id="report-table-body" class="font-body text-sm divide-y divide-surface-container">
                            <!-- Transactions injected here -->
                        </tbody>
                    </table>
                </div>
                <div class="px-8 py-8 bg-surface-container-low/50 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <div class="text-xs text-on-surface-variant max-w-sm">
                        Laporan ini digenerasi secara otomatis. Semua data di atas sesuai dengan catatan transaksi di sistem Fintjam.
                    </div>
                </div>
            </section>
        </div>
    </main>
    
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            
            const user = getCurrentUser();
            const transactions = getData(STORAGE_KEYS.TRANSACTIONS) || [];
            const userTransactions = transactions.filter(t => t.user_id === user.id)
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            
            let income = 0;
            let expense = 0;
            
            const tbody = document.getElementById('report-table-body');
            tbody.innerHTML = '';
            
            userTransactions.forEach(tx => {
                if (tx.type === 'pemasukan') income += tx.amount;
                else expense += tx.amount;
                
                const date = new Date(tx.created_at).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
                const amountColor = tx.type === 'pemasukan' ? 'text-primary' : 'text-error';
                
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-surface-bright transition-colors';
                tr.innerHTML = `
                    <td class="px-8 py-5 text-on-surface-variant">${date}</td>
                    <td class="px-8 py-5"><span class="px-2 py-1 bg-secondary-container text-on-secondary-container rounded text-[10px] font-bold uppercase">${tx.category}</span></td>
                    <td class="px-8 py-5 font-medium">${tx.note || '-'}</td>
                    <td class="px-8 py-5 text-right font-bold ${amountColor}">${formatRupiah(tx.amount)}</td>
                `;
                tbody.appendChild(tr);
            });
            
            document.getElementById('report-income').textContent = formatRupiah(income);
            document.getElementById('report-expense').textContent = formatRupiah(expense);
            document.getElementById('report-balance').textContent = formatRupiah(income - expense);
            
            const now = new Date();
            document.getElementById('report-month').textContent = now.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
        });
    </script>
</body>
</html>
