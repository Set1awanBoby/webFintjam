<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Fintjam - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&amp;family=Inter:wght@400;500;600&amp;family=Public+Sans:wght@300;400;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#efedee",
                        "on-secondary-fixed-variant": "#42474b",
                        "on-error-container": "#93000a",
                        "primary-container": "#3366cc",
                        "on-primary-fixed": "#001946",
                        "surface-bright": "#faf9fa",
                        "secondary-fixed-dim": "#c2c7cc",
                        "on-surface-variant": "#434653",
                        "primary-fixed": "#d9e2ff",
                        "on-tertiary-fixed": "#211b00",
                        "surface-dim": "#dbdadb",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#dcc661",
                        "secondary-container": "#dfe3e8",
                        "primary-fixed-dim": "#b1c5ff",
                        "secondary": "#5a5f63",
                        "surface-variant": "#e3e2e3",
                        "error-container": "#ffdad6",
                        "inverse-surface": "#303031",
                        "on-secondary-container": "#606569",
                        "tertiary-container": "#bfab49",
                        "surface-container-low": "#f5f3f4",
                        "inverse-primary": "#b1c5ff",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "on-secondary-fixed": "#171c20",
                        "surface-container-high": "#e9e8e9",
                        "on-primary-container": "#e7ebff",
                        "inverse-on-surface": "#f2f0f1",
                        "on-background": "#1b1c1d",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#094cb2",
                        "surface": "#faf9fa",
                        "outline-variant": "#c3c6d5",
                        "outline": "#737784",
                        "on-tertiary-fixed-variant": "#524600",
                        "on-error": "#ffffff",
                        "background": "#faf9fa",
                        "surface-container-highest": "#e3e2e3",
                        "on-primary-fixed-variant": "#00419d",
                        "tertiary": "#6d5e00",
                        "secondary-fixed": "#dfe3e8",
                        "tertiary-fixed": "#f9e37a",
                        "on-surface": "#1b1c1d",
                        "surface-tint": "#2259bf",
                        "on-tertiary-container": "#4a3f00"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Noto Serif"],
                        "display": ["Noto Serif"],
                        "body": ["Inter"],
                        "label": ["Public Sans"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        .font-headline { font-family: 'Noto Serif', serif; }
        .font-label { font-family: 'Public Sans', sans-serif; }
        body { min-height: max(884px, 100dvh); }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
    <main class="flex-grow flex items-center justify-center px-6 py-12">
        <div class="max-w-md w-full space-y-12">
            <header class="text-center space-y-4">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-surface-container-high rounded-full mb-4">
                    <span class="material-symbols-outlined text-primary text-3xl">account_balance_wallet</span>
                </div>
                <h1 class="font-headline text-4xl font-bold tracking-tight text-on-surface">Fintjam</h1>
                <p class="font-body text-on-surface-variant text-sm tracking-wide">Kelola keuangan Anda dengan presisi editorial.</p>
            </header>
            <div class="bg-surface-container-lowest p-10 rounded-xl space-y-8">
                <form class="space-y-6">
                    <div class="space-y-2">
                        <label class="font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant ml-1" for="username">Username</label>
                        <div class="relative">
                            <input class="w-full bg-white border-0 ring-1 ring-outline-variant/30 focus:ring-2 focus:ring-primary py-4 px-4 rounded-lg transition-all font-body text-sm placeholder:text-outline" id="username" name="username" placeholder="Masukkan username Anda" required="" type="text"/>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between items-center px-1">
                            <label class="font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant" for="password">Kata Sandi</label>
                            <a class="text-[10px] font-label uppercase tracking-tighter text-tertiary hover:underline" href="#">Lupa Sandi?</a>
                        </div>
                        <div class="relative">
                            <input class="w-full bg-white border-0 ring-1 ring-outline-variant/30 focus:ring-2 focus:ring-primary py-4 px-4 rounded-lg transition-all font-body text-sm placeholder:text-outline" id="password" name="password" placeholder="••••••••" required="" type="password"/>
                        </div>
                    </div>
                    <div class="pt-4">
                        <button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-label font-bold py-4 rounded-lg shadow-sm hover:opacity-95 active:scale-[0.98] transition-all flex justify-center items-center gap-2" type="submit">
                            <span>Masuk ke Fintjam</span>
                            <span class="material-symbols-outlined text-sm">arrow_forward</span>
                        </button>
                    </div>
                </form>
                <div class="relative flex items-center py-2">
                    <div class="flex-grow border-t border-outline-variant/20"></div>
                    <span class="flex-shrink mx-4 font-label text-[10px] uppercase tracking-[0.2em] text-outline">Atau</span>
                    <div class="flex-grow border-t border-outline-variant/20"></div>
                </div>
                <div class="text-center">
                    <p class="font-body text-sm text-on-surface-variant">
                        Belum memiliki akun? 
                        <a class="text-primary font-semibold hover:underline decoration-primary/30 underline-offset-4 ml-1" href="register.html">Daftar Sekarang</a>
                    </p>
                </div>
            </div>
            <footer class="text-center space-y-6">
                <div class="flex justify-center gap-8">
                    <div class="text-center">
                        <p class="font-label text-[10px] uppercase tracking-widest text-outline mb-1">Total Penyaluran</p>
                        <p class="font-headline text-lg font-bold text-on-surface">Rp 12,4M+</p>
                    </div>
                    <div class="w-px bg-outline-variant/20 h-8 self-center"></div>
                    <div class="text-center">
                        <p class="font-label text-[10px] uppercase tracking-widest text-outline mb-1">Pengguna Aktif</p>
                        <p class="font-headline text-lg font-bold text-on-surface">15,800</p>
                    </div>
                </div>
                <p class="font-label text-[10px] uppercase tracking-[0.3em] text-outline pt-8">© 2024 Fintjam Digital Ecosystem</p>
            </footer>
        </div>
    </main>
    <div class="fixed top-0 left-0 w-full h-1 bg-gradient-to-r from-primary via-tertiary to-primary-container"></div>
    
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script>
        checkAuth(false);
    </script>
</body>
</html>
